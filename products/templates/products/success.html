<!DOCTYPE html>
<html>
<head>
    <title>Compra exitosa</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
    theme: {
        extend: {
        colors: {
            primary: '#8B6B5A',
            accent: '#C7A17A',
            background: '#FFFFFF',
            surface: '#F3ECE6',
            soft: '#E2D5C9',
            text: '#000000'
        }
        }
    }
    }
    </script>
</head>

<body class="bg-white text-black">

<!-- NAVBAR -->
<nav class="sticky top-0 z-50 backdrop-blur-xl bg-[#8B6B5A]/90 border-b border-[#C7A17A]/30">


<div class="max-w-7xl mx-auto px-4 md:px-8 py-4 md:py-5 flex justify-between items-center">

    <a href="/"
       class="text-lg font-light tracking-[0.3em] text-white">

        NOA

    </a>

    <a href="/cart/"
    class="relative inline-flex items-center justify-center text-white transition duration-300 hover:scale-110">

        <svg xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6 md:w-7 md:h-7"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="1.8">

            <path stroke-linecap="round"
                stroke-linejoin="round"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 6h13M10 21a1 1 0 100-2 1 1 0 000 2zm8 0a1 1 0 100-2 1 1 0 000 2z" />

        </svg>

        <span id="cart-count"
            class="absolute -top-1 -right-2 bg-[#C7A17A] text-white text-[10px] font-semibold px-2 py-0.5 rounded-full shadow-lg">

            {{ cart_count }}

        </span>

    </a>

</div>


</nav>

<!-- CONTENIDO -->
<div class="min-h-[80vh] flex items-center justify-center px-4 md:px-6">

    <div class="text-center max-w-md w-full bg-[#F3ECE6] p-6 md:p-8 rounded-2xl">

        <h1 class="text-2xl md:text-3xl font-semibold mb-4">
            Gracias por tu compra 🎉
        </h1>

        <p class="text-sm md:text-base text-gray-600 mb-6">
            Tu pedido fue realizado correctamente
        </p>

        <a href="/" 
           class="block w-full bg-[#8B6B5A] text-white py-4 rounded-xl text-base md:text-lg font-medium 
                  hover:bg-[#755646] transition">
            Volver a la tienda
        </a>

    </div>

</div>

</body>
</html>
