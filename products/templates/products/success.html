<!DOCTYPE html>
<html>
<head>
    <title>Compra exitosa</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
    theme: {
        extend: {
        colors: {
            primary: '#8B6B5A',
            accent: '#C7A17A',
            background: '#FFFFFF',
            surface: '#F3ECE6',
            soft: '#E2D5C9',
            text: '#000000'
        }
        }
    }
    }
    </script>
</head>

<body class="bg-white text-black">

<!-- NAVBAR -->
<nav class="bg-[#8B6B5A] backdrop-blur-xl border-b border-[#C7A17A] px-4 md:px-8 py-4 md:py-5 flex justify-between items-center sticky top-0 z-50">

    <a href="/" class="text-lg md:text-xl font-semibold text-white hover:text-[#C7A17A] transition">
        NOA
    </a>

    <a href="/cart/" class="relative inline-block text-xl md:text-2xl text-white transition duration-300 hover:scale-125 hover:-rotate-6">
        🛒

        <span id="cart-count"
            class="absolute -top-1 -right-2 bg-[#C7A17A] text-white text-xs px-2 py-0.5 rounded-full">
            {{ cart_count }}
        </span>
    </a>

</nav>

<!-- CONTENIDO -->
<div class="min-h-[80vh] flex items-center justify-center px-4 md:px-6">

    <div class="text-center max-w-md w-full bg-[#F3ECE6] p-6 md:p-8 rounded-2xl">

        <h1 class="text-2xl md:text-3xl font-semibold mb-4">
            Gracias por tu compra 🎉
        </h1>

        <p class="text-sm md:text-base text-gray-600 mb-6">
            Tu pedido fue realizado correctamente
        </p>

        <a href="/" 
           class="block w-full bg-[#8B6B5A] text-white py-4 rounded-xl text-base md:text-lg font-medium 
                  hover:bg-[#755646] transition">
            Volver a la tienda
        </a>

    </div>

</div>

</body>
</html>
