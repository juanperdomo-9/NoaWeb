<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>NOA</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
    tailwind.config = {
    theme: {
        extend: {
        colors: {
            primary: '#8B6B5A',
            accent: '#C7A17A',
            background: '#FFFFFF',
            surface: '#F3ECE6',
            soft: '#E2D5C9',
            text: '#000000'
        }
        }
    }
    }
    </script>

    <style>
    #home {
        animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    #catalogo {
        animation: fadeIn 0.8s ease;
    }

    html {
        scroll-behavior: smooth;
    }
    </style>

</head>

<body>

<section id="home" class="relative h-screen w-full">

    <!-- 🔥 IMAGEN COMO FONDO -->
    <div class="absolute inset-0 bg-cover bg-center bg-no-repeat"
        style="background-image: url('{% static 'img/imgfondo.jpeg' %}');">
    </div>

    <!-- 🔥 OVERLAY OSCURO SUAVE -->
    <div class="absolute inset-0 bg-black/30"></div>

    <!-- 🔥 CONTENIDO -->
    <div class="relative z-10 h-full flex flex-col justify-center items-center text-center">

        <!-- MARCA -->
        <h1 class="text-6xl md:text-8xl font-light tracking-[0.3em] text-white">
            NOA
        </h1>

        <!-- SUB -->
        <p class="mt-6 text-white/70 text-sm tracking-widest">
            20% POR TRANSFERENCIA - 3 CUOTAS SIN INTERÉS
        </p>

        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 text-white text-xs tracking-widest animate-bounce">
            ↓ SCROLL
        </div>

    </div>

</section>

<!-- 🧢 NAVBAR -->
<nav id="navbar" class="fixed top-0 left-0 w-full px-6 py-4 flex justify-between items-center z-50 transition-all duration-500">

    <a href="/" class="text-lg font-light tracking-widest text-white">
        NOA
    </a>

    <a href="/cart/" class="relative text-xl text-white">
        🛒
        <span id="cart-count"
            class="absolute -top-1 -right-2 bg-[#C7A17A] text-white text-xs px-2 py-0.5 rounded-full">
            {{ cart_count }}
        </span>
    </a>

</nav>

<!-- 🛍️ CATÁLOGO -->
<section id="catalogo">

<div class="max-w-7xl mx-auto px-4 md:px-12 py-6 md:py-14 
            grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 
            gap-x-4 md:gap-x-8 gap-y-6 md:gap-y-14">

{% for product in products %}
<a href="{% url 'product_detail' product.id %}" 
   class="group block bg-[#F3ECE6] rounded-2xl p-2 md:p-3 transition duration-300 hover:shadow-md hover:-translate-y-1">

    <div class="overflow-hidden rounded-xl">
        {% if product.image %}
        <img src="{{ product.image }}"
             class="w-full h-[200px] md:h-[380px] object-cover transition duration-700 group-hover:scale-[1.04]">
        {% endif %}
    </div>

    <div class="mt-3 md:mt-4 px-1 space-y-1">
        <h2 class="text-sm md:text-base font-semibold tracking-tight">
            {{ product.name }}
        </h2>

        {% if product.variants.first %}
        <p class="text-gray-600 text-xs md:text-sm">
            ${{ product.variants.first.price }}
        </p>
        {% endif %}
    </div>

</a>
{% endfor %}

</div>
</section>
</body>
<script>
window.addEventListener("scroll", () => {
    const navbar = document.getElementById("navbar");

    if (window.scrollY > window.innerHeight * 0.7) {
        navbar.classList.remove("hidden");
    } else {
        navbar.classList.add("hidden");
    }
});
</script>
<script>
window.addEventListener("scroll", () => {
    const navbar = document.getElementById("navbar");

    if (window.scrollY > window.innerHeight * 0.6) {
        navbar.style.background = "#8B6B5A";
    } else {
        navbar.style.background = "transparent";
    }
});
</script>
</html>
