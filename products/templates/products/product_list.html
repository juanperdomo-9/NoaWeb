<!DOCTYPE html>
<html>
<head>
    <title>NOA</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
    tailwind.config = {
    theme: {
        extend: {
        colors: {
            primary: '#8B6B5A',
            accent: '#C7A17A',
            background: '#FFFFFF',
            surface: '#F3ECE6',
            soft: '#E2D5C9',
            text: '#000000'
        }
        }
    }
    }
    </script>

    <style>
    #home {
        animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    #catalogo {
        animation: fadeIn 0.8s ease;
    }
    </style>

</head>

<body class="bg-[#F5EFEA] text-black">

<!-- 🔥 HOME -->
<section id="home" 
class="h-screen flex flex-col justify-center items-center text-center 
bg-gradient-to-b from-[#F5EFEA] to-[#EDE3D9]">
    <!-- Marca -->
    <h1 class="text-6xl md:text-8xl font-semibold tracking-widest text-[#8B6B5A]">
        NOA
    </h1>

    <!-- Subtítulo -->
    <p class="mt-4 text-gray-500 text-sm md:text-base">
        Minimalismo, diseño y esencia
    </p>

    <!-- Botón -->
    <button onclick="enterStore()" 
        class="mt-8 px-6 py-3 border border-[#8B6B5A] text-[#8B6B5A] rounded-full 
               hover:bg-[#8B6B5A] hover:text-white transition duration-300">
        Ver catálogo
    </button>

</section>

<!-- 🧢 NAVBAR -->
<nav id="navbar" class="hidden bg-[#8B6B5A] border-b border-[#C7A17A] px-4 md:px-8 py-4 flex justify-between items-center sticky top-0 z-50">

    <a href="/" class="text-lg md:text-xl font-semibold text-white">
        NOA
    </a>

    <a href="/cart/" class="relative text-xl md:text-2xl text-white">
        🛒
        <span id="cart-count"
            class="absolute -top-1 -right-2 bg-[#C7A17A] text-white text-xs px-2 py-0.5 rounded-full">
            {{ cart_count }}
        </span>
    </a>

</nav>

<!-- 🛍️ CATÁLOGO -->
<section id="catalogo" class="hidden">

<div class="max-w-7xl mx-auto px-4 md:px-12 py-6 md:py-14 
            grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 
            gap-x-4 md:gap-x-8 gap-y-6 md:gap-y-14">

{% for product in products %}
<a href="{% url 'product_detail' product.id %}" 
   class="group block bg-[#F3ECE6] rounded-2xl p-2 md:p-3 transition duration-300 hover:shadow-md hover:-translate-y-1">

    <div class="overflow-hidden rounded-xl">
        {% if product.image %}
        <img src="{{ product.image }}"
             class="w-full h-[200px] md:h-[380px] object-cover transition duration-700 group-hover:scale-[1.04]">
        {% endif %}
    </div>

    <div class="mt-3 md:mt-4 px-1 space-y-1">
        <h2 class="text-sm md:text-base font-semibold tracking-tight">
            {{ product.name }}
        </h2>

        {% if product.variants.first %}
        <p class="text-gray-600 text-xs md:text-sm">
            ${{ product.variants.first.price }}
        </p>
        {% endif %}
    </div>

</a>
{% endfor %}

</div>

</section>

<!-- 🔥 SCRIPT -->
<script>
function enterStore() {
    document.getElementById("home").style.display = "none";
    document.getElementById("catalogo").classList.remove("hidden");
    document.getElementById("navbar").classList.remove("hidden");
}
</script>

</body>
</html>
